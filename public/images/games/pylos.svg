<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="p-tray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B4384A" />
      <stop offset="100%" stop-color="#7A2030" />
    </linearGradient>
    <linearGradient id="p-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9C3040" />
      <stop offset="100%" stop-color="#6E1F2C" />
    </linearGradient>
    <radialGradient id="p-dimple" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#5C1622" />
      <stop offset="100%" stop-color="#440F18" />
    </radialGradient>
    <radialGradient id="p-gold" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#F6C25E" />
      <stop offset="100%" stop-color="#C1841D" />
    </radialGradient>
    <radialGradient id="p-burgundy" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#9C3450" />
      <stop offset="100%" stop-color="#511628" />
    </radialGradient>
    <radialGradient id="p-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="360" rx="150" ry="16" fill="url(#p-shadow)" />

  <rect x="20" y="20" width="360" height="360" rx="20" fill="url(#p-tray)" />
  <rect x="66" y="66" width="268" height="268" rx="12" fill="url(#p-inner)" />

  <!-- 4x4 dimple grid -->
  <g>
    <circle cx="128" cy="128" r="11" fill="url(#p-dimple)" />
    <circle cx="176" cy="128" r="11" fill="url(#p-dimple)" />
    <circle cx="224" cy="128" r="11" fill="url(#p-dimple)" />
    <circle cx="272" cy="128" r="11" fill="url(#p-dimple)" />

    <circle cx="128" cy="176" r="11" fill="url(#p-dimple)" />
    <circle cx="176" cy="176" r="11" fill="url(#p-dimple)" />
    <circle cx="224" cy="176" r="11" fill="url(#p-dimple)" />
    <circle cx="272" cy="176" r="11" fill="url(#p-dimple)" />

    <circle cx="128" cy="224" r="11" fill="url(#p-dimple)" />
    <circle cx="176" cy="224" r="11" fill="url(#p-dimple)" />
    <circle cx="224" cy="224" r="11" fill="url(#p-dimple)" />
    <circle cx="272" cy="224" r="11" fill="url(#p-dimple)" />

    <circle cx="128" cy="272" r="11" fill="url(#p-dimple)" />
    <circle cx="176" cy="272" r="11" fill="url(#p-dimple)" />
    <circle cx="224" cy="272" r="11" fill="url(#p-dimple)" />
    <circle cx="272" cy="272" r="11" fill="url(#p-dimple)" />
