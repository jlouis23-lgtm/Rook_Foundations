  <!-- Border spheres: gold along top + right, burgundy along left + bottom -->
  <g>
    <circle cx="50" cy="50" r="17" fill="url(#p-gold)" />
    <circle cx="88" cy="42" r="17" fill="url(#p-gold)" />
    <circle cx="126" cy="42" r="17" fill="url(#p-gold)" />
    <circle cx="164" cy="42" r="17" fill="url(#p-gold)" />
    <circle cx="202" cy="42" r="17" fill="url(#p-gold)" />
    <circle cx="240" cy="42" r="17" fill="url(#p-gold)" />
    <circle cx="278" cy="42" r="17" fill="url(#p-gold)" />
    <circle cx="316" cy="42" r="17" fill="url(#p-gold)" />
    <circle cx="352" cy="50" r="17" fill="url(#p-gold)" />

    <circle cx="358" cy="88" r="17" fill="url(#p-gold)" />
    <circle cx="358" cy="126" r="17" fill="url(#p-gold)" />
    <circle cx="358" cy="164" r="17" fill="url(#p-gold)" />
    <circle cx="358" cy="202" r="17" fill="url(#p-gold)" />
    <circle cx="358" cy="240" r="17" fill="url(#p-gold)" />
    <circle cx="358" cy="278" r="17" fill="url(#p-gold)" />
    <circle cx="358" cy="316" r="17" fill="url(#p-gold)" />
    <circle cx="352" cy="352" r="17" fill="url(#p-gold)" />

    <circle cx="48" cy="88" r="17" fill="url(#p-burgundy)" />
    <circle cx="42" cy="126" r="17" fill="url(#p-burgundy)" />
    <circle cx="42" cy="164" r="17" fill="url(#p-burgundy)" />
    <circle cx="42" cy="202" r="17" fill="url(#p-burgundy)" />
    <circle cx="42" cy="240" r="17" fill="url(#p-burgundy)" />
    <circle cx="42" cy="278" r="17" fill="url(#p-burgundy)" />
    <circle cx="42" cy="316" r="17" fill="url(#p-burgundy)" />

    <circle cx="88" cy="358" r="17" fill="url(#p-burgundy)" />
    <circle cx="126" cy="358" r="17" fill="url(#p-burgundy)" />
    <circle cx="164" cy="358" r="17" fill="url(#p-burgundy)" />
    <circle cx="202" cy="358" r="17" fill="url(#p-burgundy)" />
    <circle cx="240" cy="358" r="17" fill="url(#p-burgundy)" />
    <circle cx="278" cy="358" r="17" fill="url(#p-burgundy)" />
    <circle cx="316" cy="358" r="17" fill="url(#p-burgundy)" />
  </g>
</svg>
