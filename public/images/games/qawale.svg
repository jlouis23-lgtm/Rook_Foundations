<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="w-tray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B3B3B" />
      <stop offset="100%" stop-color="#161616" />
    </linearGradient>
    <radialGradient id="w-slot" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0A0A0A" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
    <linearGradient id="w-natural" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1DEB1" />
      <stop offset="100%" stop-color="#DAB878" />
    </linearGradient>
    <linearGradient id="w-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFB247" />
      <stop offset="100%" stop-color="#C1841D" />
    </linearGradient>
    <linearGradient id="w-burgundy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9C3450" />
      <stop offset="100%" stop-color="#5E1B2C" />
    </linearGradient>
    <linearGradient id="w-black" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E3E3E" />
      <stop offset="100%" stop-color="#181818" />
    </linearGradient>
    <radialGradient id="w-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="358" rx="150" ry="16" fill="url(#w-shadow)" />

  <rect x="24" y="24" width="352" height="352" rx="24" fill="url(#w-tray)" />

  <!-- Recessed slot grid: 4 columns x 5 rows -->
  <g>
    <ellipse cx="90" cy="80"  rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="170" cy="80"  rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="250" cy="80"  rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="330" cy="80"  rx="26" ry="20" fill="url(#w-slot)" />

    <ellipse cx="90" cy="150" rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="170" cy="150" rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="250" cy="150" rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="330" cy="150" rx="26" ry="20" fill="url(#w-slot)" />

    <ellipse cx="90" cy="220" rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="170" cy="220" rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="250" cy="220" rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="330" cy="220" rx="26" ry="20" fill="url(#w-slot)" />

    <ellipse cx="90" cy="290" rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="170" cy="290" rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="250" cy="290" rx="26" ry="20" fill="url(#w-slot)" />
    <ellipse cx="330" cy="290" rx="26" ry="20" fill="url(#w-slot)" />
  </g>

  <!-- Pebble stacks (top pebble shown per occupied slot; a few show a second layer peeking out) -->
  <ellipse cx="93" cy="76" rx="30" ry="16" fill="url(#w-burgundy)" />
  <ellipse cx="90" cy="80" rx="26" ry="14" fill="url(#w-natural)" />

  <ellipse cx="170" cy="80" rx="26" ry="14" fill="url(#w-gold)" />

  <ellipse cx="253" cy="76" rx="30" ry="16" fill="url(#w-natural)" />
  <ellipse cx="250" cy="80" rx="26" ry="14" fill="url(#w-burgundy)" />

  <ellipse cx="330" cy="80" rx="26" ry="14" fill="url(#w-natural)" />

  <ellipse cx="170" cy="150" rx="26" ry="14" fill="url(#w-burgundy)" />

  <ellipse cx="253" cy="146" rx="30" ry="16" fill="url(#w-gold)" />
  <ellipse cx="250" cy="150" rx="26" ry="14" fill="url(#w-natural)" />

  <ellipse cx="90" cy="220" rx="26" ry="14" fill="url(#w-gold)" />

  <ellipse cx="330" cy="220" rx="26" ry="14" fill="url(#w-black)" />

  <ellipse cx="170" cy="290" rx="26" ry="14" fill="url(#w-gold)" />

  <ellipse cx="253" cy="286" rx="30" ry="16" fill="url(#w-burgundy)" />
  <ellipse cx="250" cy="290" rx="26" ry="14" fill="url(#w-gold)" />
</svg>
